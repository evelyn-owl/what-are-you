<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Який Ти?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style id="theme-style"></style>
</head>
<body>

  <div id="screen-home" class="screen active">
    <header class="top-bar">
      <div class="logo">ЯКИЙ ТИ?</div>
      <div class="top-right">
        <button class="theme-toggle" id="theme-btn">☀</button>
        <button class="lang-toggle" id="lang-btn">EN</button>
      </div>
    </header>
    <main class="home-main">
      <div class="home-hero">
        <div class="home-orb">✨</div>
        <p class="home-eyebrow" data-i18n="home_eyebrow">Відкрий свою природу</p>
        <h1 class="home-title">Який Ти?</h1>
        <p class="home-subtitle" data-i18n="home_subtitle">Пройди магічний квіз і дізнайся хто ти</p>
      </div>
      <div class="quiz-grid" id="quiz-grid"></div>
    </main>
  </div>

  <div id="screen-quiz" class="screen">
    <header class="top-bar">
      <button class="back-btn" id="quiz-back-btn">←</button>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <span class="progress-label" id="progress-label"></span>
      </div>
      <div class="top-right">
        <button class="theme-toggle" id="theme-btn-quiz">☀</button>
        <button class="lang-toggle" id="lang-btn-quiz">EN</button>
      </div>
    </header>
    <main class="quiz-main">
      <div class="question-card" id="question-card">
        <p class="question-num" id="question-num"></p>
        <p class="question-text" id="question-text"></p>
        <div class="options-grid" id="options-grid"></div>
      </div>
    </main>
  </div>

  <div id="screen-result" class="screen">
    <header class="top-bar">
      <button class="back-btn" id="result-back-btn">←</button>
      <div class="logo">ЯКИЙ ТИ?</div>
      <div class="top-right">
        <button class="theme-toggle" id="theme-btn-result">☀</button>
        <button class="lang-toggle" id="lang-btn-result">EN</button>
      </div>
    </header>
    <main class="result-main">
      <div class="result-photo-wrap">
        <span class="result-emoji-fallback" id="result-emoji-fallback"></span>
        <img class="result-photo" id="result-photo" alt="" style="display:none"/>
      </div>
      <p class="result-eyebrow" id="result-eyebrow">ТИ —</p>
      <h2 class="result-name" id="result-name"></h2>
      <div class="result-traits" id="result-traits"></div>
      <p class="result-desc" id="result-desc"></p>
    </main>
    <footer class="result-footer">
      <button class="btn-share" id="btn-share">✦ Поділитися</button>
      <button class="btn-retry" id="btn-retry">Пройти ще раз</button>
    </footer>
  </div>

let currentTheme = 'dark';
function applyTheme(name) {
  currentTheme = name;
  document.getElementById('theme-style').textContent = THEMES[name];
  ['theme-btn','theme-btn-quiz','theme-btn-result'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = name === 'dark' ? '☀' : '☽';
  });
}

async function fetchWikiPhoto(animalId) {
  const wikiName = WIKI_NAMES[animalId];
  if (!wikiName) return null;
  try {
    const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wikiName)}`);
    if (!res.ok) return null;
    const data = await res.json();
    const src = data?.thumbnail?.source;
    if (!src) return null;
    return src.replace(/\/\d+px-/, '/400px-');
  } catch (e) { return null; }
}

let lang = 'ua';
let currentQuiz = null;
let questions = [];
let currentQ = 0;
let answers = [];
let currentAnimal = null;

const $ = id => document.getElementById(id);
const t = key => UI_TEXT[lang][key] || key;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

function updateLangButtons() {
  const label = lang === 'ua' ? 'EN' : 'UA';
  ['lang-btn','lang-btn-quiz','lang-btn-result'].forEach(id => {
    const el = $(id); if (el) el.textContent = label;
  });
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showToast(msg) {
  let toast = document.querySelector('.toast');
  if (!toast) { toast = document.createElement('div'); toast.className = 'toast'; document.body.appendChild(toast); }
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function renderHome() {
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
  const grid = $('quiz-grid');
  grid.innerHTML = '';
  QUIZZES.forEach(quiz => {
    const card = document.createElement('div');
    card.className = 'quiz-card' + (quiz.available ? '' : ' coming-soon');
    card.innerHTML = `
      <div class="quiz-card-emoji">${quiz.emoji}</div>
      <div class="quiz-card-body">
        <div class="quiz-card-title">${quiz.i18n[lang].title}</div>
        <div class="quiz-card-desc">${quiz.i18n[lang].desc}</div>
      </div>
      ${quiz.available ? '<div class="quiz-card-arrow">→</div>' : `<div class="coming-soon-badge">${t('coming_soon')}</div>`}
    `;
    if (quiz.available) card.addEventListener('click', () => startQuiz(quiz));
    grid.appendChild(card);
  });
}

function startQuiz(quiz) {
  currentQuiz = quiz;
  answers = [];
  const data = QUIZ_DATA[quiz.id];
  if (!data) return;
  currentQuiz.data = data;
  questions = shuffle(data.questions).slice(0, data.meta.questions_count || 8);
  currentQ = 0;
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  const total = questions.length;
  $('progress-fill').style.width = Math.round((currentQ / total) * 100) + '%';
  $('progress-label').textContent = t('progress').replace('{current}', currentQ + 1).replace('{total}', total);
  $('question-num').textContent = `ПИТАННЯ ${currentQ + 1}`;
  $('question-text').textContent = q.i18n[lang].text;
  const grid = $('options-grid');
  grid.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt.i18n[lang].label;
    btn.addEventListener('click', () => selectAndAdvance(btn, opt));
    grid.appendChild(btn);
  });
  const card = $('question-card');
  card.style.animation = 'none';
  requestAnimationFrame(() => { card.style.animation = ''; });
}

function selectAndAdvance(btn, opt) {
  document.querySelectorAll('.option-btn').forEach(b => { b.style.pointerEvents = 'none'; });
  btn.classList.add('selected');
  answers.push(opt);
  setTimeout(() => {
    currentQ++;
    if (currentQ >= questions.length) showResult();
    else renderQuestion();
  }, 650);
}

function calcResult() {
  const scores = {};
  answers.forEach(opt => { opt.animals.forEach(a => { scores[a] = (scores[a] || 0) + 1; }); });
  const winner = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
  return currentQuiz.data.animals.find(a => a.id === winner);
}

async function showResult() {
  currentAnimal = calcResult();
  const info = currentAnimal.i18n[lang];

  $('result-eyebrow').textContent = t('result_eyebrow');
  $('result-name').textContent = info.name;
  $('result-desc').textContent = info.description;
  $('result-emoji-fallback').textContent = currentAnimal.emoji;
  $('result-emoji-fallback').style.opacity = '1';

  const img = $('result-photo');
  img.style.opacity = '0';
  img.style.display = 'block';

  fetchWikiPhoto(currentAnimal.id).then(photoUrl => {
    if (photoUrl) {
      img.src = photoUrl;
      img.onload = () => { $('result-emoji-fallback').style.opacity = '0'; img.style.opacity = '1'; };
      img.onerror = () => { img.style.display = 'none'; };
    }
  });

  const traitsEl = $('result-traits');
  traitsEl.innerHTML = '';
  info.traits.forEach(tr => {
    const pill = document.createElement('span');
    pill.className = 'trait-pill'; pill.textContent = tr;
    traitsEl.appendChild(pill);
  });
  $('btn-share').textContent = t('btn_share');
  $('btn-retry').textContent = t('btn_retry');
  showScreen('result');
}

function refreshResult() {
  if (!currentAnimal) return;
  const info = currentAnimal.i18n[lang];
  $('result-eyebrow').textContent = t('result_eyebrow');
  $('result-name').textContent = info.name;
  $('result-desc').textContent = info.description;
  const traitsEl = $('result-traits');
  traitsEl.innerHTML = '';
  info.traits.forEach(tr => {
    const pill = document.createElement('span');
    pill.className = 'trait-pill'; pill.textContent = tr;
    traitsEl.appendChild(pill);
  });
  $('btn-share').textContent = t('btn_share');
  $('btn-retry').textContent = t('btn_retry');
}

$('btn-share').addEventListener('click', async () => {
  const name = $('result-name').textContent;
  const text = lang === 'ua' ? `Я — ${name}! Дізнайся хто ти` : `I am a ${name}! Find out who you are`;
  if (navigator.share) {
    try { await navigator.share({ title: text, text: text, url: location.href }); } catch (_) {}
  } else {
    try { await navigator.clipboard.writeText(location.href); } catch (_) {}
    showToast(t('copied'));
  }
});

$('btn-retry').addEventListener('click', () => { startQuiz(currentQuiz); });
$('quiz-back-btn').addEventListener('click', () => { showScreen('home'); renderHome(); });
$('result-back-btn').addEventListener('click', () => { showScreen('home'); renderHome(); });

function toggleLang() {
  lang = lang === 'ua' ? 'en' : 'ua';
  updateLangButtons();
  const active = document.querySelector('.screen.active').id;
  if (active === 'screen-home') renderHome();
  else if (active === 'screen-quiz') renderQuestion();
  else if (active === 'screen-result') refreshResult();
}

function toggleTheme() {
  applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
}

['lang-btn','lang-btn-quiz','lang-btn-result'].forEach(id => {
  const el = $(id); if (el) el.addEventListener('click', toggleLang);
});
['theme-btn','theme-btn-quiz','theme-btn-result'].forEach(id => {
  const el = $(id); if (el) el.addEventListener('click', toggleTheme);
});

renderHome();

applyTheme('dark');
  </script>
</body>
</html>
