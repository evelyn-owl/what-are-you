<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ХТОТИ?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style id="theme-style"></style>
</head>
<body>

  <div id="screen-home" class="screen active">
    <header class="top-bar">
      <div class="logo" id="logo-home"><span class="w1">ХТО</span><span class="w2">ТИ?</span></div>
      <div class="top-right">
        <button class="theme-toggle" id="theme-btn">☀</button>
        <button class="lang-toggle" id="lang-btn">EN</button>
      </div>
    </header>
    <main class="home-main">
      <div class="home-hero">
        <div class="home-orb">✨</div>
        <p class="home-eyebrow" data-i18n="home_eyebrow">Відкрий свою природу</p>
        <h1 class="home-title"><span class="w1">ХТО</span><span class="w2">ТИ?</span></h1>
        <p class="home-subtitle" data-i18n="home_subtitle">Пройди магічний квіз і дізнайся хто ти</p>
      </div>
      <div class="quiz-grid" id="quiz-grid"></div>
    </main>
  </div>

  <div id="screen-quiz" class="screen">
    <header class="top-bar">
      <button class="back-btn" id="quiz-back-btn">←</button>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <span class="progress-label" id="progress-label"></span>
      </div>
      <div class="top-right">
        <button class="theme-toggle" id="theme-btn-quiz">☀</button>
        <button class="lang-toggle" id="lang-btn-quiz">EN</button>
      </div>
    </header>
    <main class="quiz-main">
      <div class="question-card" id="question-card">
        <p class="question-num" id="question-num"></p>
        <p class="question-text" id="question-text"></p>
        <div class="options-grid" id="options-grid"></div>
      </div>
    </main>
  </div>

  <div id="screen-result" class="screen">
    <header class="top-bar">
      <button class="back-btn" id="result-back-btn">←</button>
      <div class="logo" id="logo-result"><span class="w1">ХТО</span><span class="w2">ТИ?</span></div>
      <div class="top-right">
        <button class="theme-toggle" id="theme-btn-result">☀</button>
        <button class="lang-toggle" id="lang-btn-result">EN</button>
      </div>
    </header>
    <main class="result-main">
      <div class="result-photo-wrap">
        <span class="result-emoji-fallback" id="result-emoji-fallback"></span>
        <img class="result-photo" id="result-photo" alt="" style="display:none"/>
      </div>
      <p class="result-eyebrow" id="result-eyebrow">ТИ —</p>
      <h2 class="result-name" id="result-name"></h2>
      <div class="result-traits" id="result-traits"></div>
      <p class="result-desc" id="result-desc"></p>
    </main>
    <footer class="result-footer">
      <button class="btn-share" id="btn-share">✦ Поділитися</button>
      <button class="btn-retry" id="btn-retry">Пройти ще раз</button>
    </footer>
  </div>

let currentTheme = 'dark';

function applyTheme(name) {
  currentTheme = name;
  document.getElementById('theme-style').textContent = THEMES_CSS[name];
  const lbl = THEME_LABELS[name];
  ['theme-btn','theme-btn-quiz','theme-btn-result'].forEach(id => {
    const el = document.getElementById(id); if (el) el.textContent = lbl;
  });
}
function toggleTheme() {
  applyTheme(currentTheme === 'dark' ? 'vivid' : 'dark');
}

const PECULIAR_PHOTOS = {"jacob": "teenager boy adventure portrait", "emma": "girl fire portrait fantasy", "olive": "girl floating balloons portrait", "enoch": "boy dark mysterious portrait", "miss_peregrine": "woman elegant birds portrait", "bronwyn": "strong girl portrait", "millard": "invisible person silhouette art", "horace": "elegant boy vintage hat portrait"};

async function fetchPhoto(id, quizId) {
  try {
    if (quizId === 'peculiar') {
      const q = PECULIAR_PHOTOS[id] || id;
      const res = await fetch(`https://en.wikipedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(q)}&prop=pageimages&piprop=thumbnail&pithumbsize=400&format=json&origin=*&gsrlimit=1`);
      const data = await res.json();
      const pages = Object.values(data?.query?.pages || {});
      return pages[0]?.thumbnail?.source || null;
    }
    const wiki = WIKI[id];
    if (!wiki) return null;
    const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wiki)}`);
    if (!res.ok) return null;
    const data = await res.json();
    const src = data?.thumbnail?.source;
    return src ? src.replace(/\/\d+px-/, '/400px-') : null;
  } catch (e) { return null; }
}

const QUIZZES = [
  { id:'animals', emoji:'🐾', available:true,
    i18n:{ ua:{title:'Яка ти тварина?', desc:'Дізнайся свого духовного звіра'}, en:{title:'What animal are you?', desc:'Discover your spirit animal'} } },
  { id:'hp', emoji:'⚡', available:true,
    i18n:{ ua:{title:'Хто ти з Гаррі Поттера?', desc:'Гоґвортс чекає на тебе'}, en:{title:'Which Harry Potter character?', desc:'Hogwarts is waiting'} } },
  { id:'peculiar', emoji:'🏠', available:true,
    i18n:{ ua:{title:'Хто ти з Дому дивних дітей?', desc:'Яка в тебе здібність?'}, en:{title:'Which Peculiar child are you?', desc:"What's your peculiarity?"} } },
  { id:'mythical', emoji:'🐉', available:false,
    i18n:{ ua:{title:'Яка ти казкова істота?', desc:'Дракон, фенікс чи єдиноріг?'}, en:{title:'Which mythical creature?', desc:'Dragon, phoenix or unicorn?'} } },
  { id:'food', emoji:'🍜', available:false,
    i18n:{ ua:{title:'Яка ти страва?', desc:'Бо ти те, що ти їси'}, en:{title:'Which dish are you?', desc:'You are what you eat'} } },
];

let lang = 'ua';
let currentQuiz = null;
let questions = [];
let currentQ = 0;
let answers = [];
let currentAnimal = null;

const $ = id => document.getElementById(id);
const t = key => UI[lang][key] || key;

function updateLogo() {
  ['logo-home','logo-result'].forEach(id => {
    const el = $(id);
    if (!el) return;
    el.innerHTML = `<span class="w1">${UI[lang].logo1}</span><span class="w2">${UI[lang].logo2}</span>`;
  });
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

function updateLangBtns() {
  const lbl = lang === 'ua' ? 'EN' : 'UA';
  ['lang-btn','lang-btn-quiz','lang-btn-result'].forEach(id => {
    const el = $(id); if (el) el.textContent = lbl;
  });
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showToast(msg) {
  let el = document.querySelector('.toast');
  if (!el) { el = document.createElement('div'); el.className = 'toast'; document.body.appendChild(el); }
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}

function renderHome() {
  updateLogo();
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
  const grid = $('quiz-grid');
  grid.innerHTML = '';
  QUIZZES.forEach(q => {
    const card = document.createElement('div');
    card.className = 'quiz-card' + (q.available ? '' : ' coming-soon');
    card.innerHTML = `
      <div class="quiz-card-emoji">${q.emoji}</div>
      <div class="quiz-card-body">
        <div class="quiz-card-title">${q.i18n[lang].title}</div>
        <div class="quiz-card-desc">${q.i18n[lang].desc}</div>
      </div>
      ${q.available ? '<div class="quiz-card-arrow">→</div>' : `<div class="coming-soon-badge">${t('coming_soon')}</div>`}
    `;
    if (q.available) card.addEventListener('click', () => startQuiz(q));
    grid.appendChild(card);
  });
}

function startQuiz(quiz) {
  currentQuiz = quiz; answers = [];
  const data = QUIZ_DATA[quiz.id]; if (!data) return;
  currentQuiz.data = data;
  questions = shuffle(data.questions).slice(0, data.meta.questions_count || 8);
  currentQ = 0; showScreen('quiz'); renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ], total = questions.length;
  $('progress-fill').style.width = Math.round((currentQ / total) * 100) + '%';
  $('progress-label').textContent = t('progress').replace('{c}', currentQ + 1).replace('{t}', total);
  $('question-num').textContent = t('q_label') + ' ' + (currentQ + 1);
  $('question-text').textContent = q.i18n[lang].text;
  const grid = $('options-grid'); grid.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-key">${i + 1}</span><span>${opt.i18n[lang].label}</span>`;
    btn.addEventListener('click', () => selectAndAdvance(btn, opt));
    grid.appendChild(btn);
  });
  const card = $('question-card');
  card.style.animation = 'none';
  requestAnimationFrame(() => { card.style.animation = ''; });
}

document.addEventListener('keydown', e => {
  if (document.querySelector('.screen.active')?.id !== 'screen-quiz') return;
  const i = ['1','2','3','4'].indexOf(e.key);
  if (i < 0) return;
  const btns = document.querySelectorAll('.option-btn');
  if (btns[i] && !btns[i].classList.contains('selected')) btns[i].click();
});

function selectAndAdvance(btn, opt) {
  document.querySelectorAll('.option-btn').forEach(b => { b.style.pointerEvents = 'none'; });
  btn.classList.add('selected'); answers.push(opt);
  setTimeout(() => {
    currentQ++;
    if (currentQ >= questions.length) showResult(); else renderQuestion();
  }, 650);
}

function calcResult() {
  const scores = {};
  answers.forEach(opt => { opt.animals.forEach(a => { scores[a] = (scores[a] || 0) + 1; }); });
  const winner = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
  return currentQuiz.data.animals.find(a => a.id === winner);
}

async function showResult() {
  currentAnimal = calcResult();
  renderResultUI();
  const img = $('result-photo');
  img.style.opacity = '0'; img.style.display = 'block';
  fetchPhoto(currentAnimal.id, currentQuiz.id).then(url => {
    if (url) {
      img.src = url;
      img.onload = () => { $('result-emoji-fallback').style.opacity = '0'; img.style.opacity = '1'; };
      img.onerror = () => { img.style.display = 'none'; };
    }
  });
  showScreen('result');
}

function renderResultUI() {
  const info = currentAnimal.i18n[lang];
  $('result-eyebrow').textContent = t('result_eyebrow');
  $('result-name').textContent = info.name;
  $('result-desc').textContent = info.description;
  $('result-emoji-fallback').textContent = currentAnimal.emoji;
  $('result-emoji-fallback').style.opacity = '1';
  const tr = $('result-traits'); tr.innerHTML = '';
  info.traits.forEach(tx => {
    const p = document.createElement('span'); p.className = 'trait-pill'; p.textContent = tx; tr.appendChild(p);
  });
  $('btn-share').textContent = t('btn_share');
  $('btn-retry').textContent = t('btn_retry');
  updateLogo();
}

$('btn-share').addEventListener('click', async () => {
  const name = $('result-name').textContent;
  const text = lang === 'ua' ? `Я — ${name}! Дізнайся хто ти` : `I am ${name}! Find out who you are`;
  if (navigator.share) {
    try { await navigator.share({ title: text, text, url: location.href }); } catch (_) {}
  } else {
    try { await navigator.clipboard.writeText(location.href); } catch (_) {}
    showToast(t('copied'));
  }
});

$('btn-retry').addEventListener('click', () => startQuiz(currentQuiz));
$('quiz-back-btn').addEventListener('click', () => { showScreen('home'); renderHome(); });
$('result-back-btn').addEventListener('click', () => { showScreen('home'); renderHome(); });

function toggleLang() {
  lang = lang === 'ua' ? 'en' : 'ua';
  updateLangBtns();
  const a = document.querySelector('.screen.active').id;
  if (a === 'screen-home') renderHome();
  else if (a === 'screen-quiz') renderQuestion();
  else if (a === 'screen-result') renderResultUI();
}

['lang-btn','lang-btn-quiz','lang-btn-result'].forEach(id => {
  const el = $(id); if (el) el.addEventListener('click', toggleLang);
});
['theme-btn','theme-btn-quiz','theme-btn-result'].forEach(id => {
  const el = $(id); if (el) el.addEventListener('click', toggleTheme);
});

applyTheme('dark');
renderHome();
</script>
