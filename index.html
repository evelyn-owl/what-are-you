<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="theme-color" content="#0a0818"/>
  <link rel="icon" href="icon.svg" type="image/svg+xml"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="apple-touch-icon" href="icon.svg"/>
  <title>ХТОТИ?</title>

</head>
<body>

  <div id="screen-home" class="screen active">
    <header class="top-bar">
      <div class="logo" id="logo-home"><span class="w1">ХТО</span><span class="w2">ТИ?</span></div>
      <div class="top-right">
        <button class="theme-toggle fs-btn" id="fs-btn" title="Fullscreen">⛶</button>
        <button class="theme-toggle" id="theme-btn">☀</button>
        <button class="theme-toggle" id="mode-btn" title="Game Mode">🧩</button>
        <button class="lang-toggle" id="lang-btn">UA</button>
      </div>
      <button class="install-btn" id="install-btn" style="display:none" data-i18n="install_btn">📲 Встановити</button>
    </header>
    <main class="home-main">
      <div class="home-hero">
        <div class="home-orb">✨</div>
        <p class="home-eyebrow" data-i18n="home_eyebrow">Відкрий свою природу</p>
        <h1 class="home-title" id="home-title"><span class="w1">ХТО</span><span class="w2">ТИ?</span></h1>
        <p class="home-subtitle" data-i18n="home_subtitle">Пройди магічний квіз і дізнайся хто ти</p>
      </div>
      <div class="quiz-grid" id="quiz-grid"></div>
    </main>
  </div>

  <div id="screen-quiz" class="screen">
    <header class="top-bar">
      <button class="back-btn" id="quiz-back-btn">←</button>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <span class="progress-label" id="progress-label"></span>
      </div>
      <div class="top-right">
        <button class="theme-toggle fs-btn" id="fs-btn-quiz" title="Fullscreen">⛶</button>
        <button class="theme-toggle" id="theme-btn-quiz">☀</button>
        <button class="theme-toggle" id="mode-btn-quiz" title="Game Mode">🧩</button>
        <button class="lang-toggle" id="lang-btn-quiz">UA</button>
      </div>
    </header>
    <main class="quiz-main">
      <div class="question-card" id="question-card">
        <p class="question-num" id="question-num"></p>
        <p class="question-text" id="question-text"></p>
        <div class="options-grid" id="options-grid"></div>
      </div>
    </main>
  </div>

  <div id="screen-result" class="screen">
    <header class="top-bar">
      <button class="back-btn" id="result-back-btn">←</button>
      <div class="logo" id="logo-result"><span class="w1">ХТО</span><span class="w2">ТИ?</span></div>
      <div class="top-right">
        <button class="theme-toggle fs-btn" id="fs-btn-result" title="Fullscreen">⛶</button>
        <button class="theme-toggle" id="theme-btn-result">☀</button>
        <button class="theme-toggle" id="mode-btn-result" title="Game Mode">🧩</button>
        <button class="lang-toggle" id="lang-btn-result">UA</button>
      </div>
    </header>
    <main class="result-main">
      <div class="result-photo-wrap">
        <span class="result-emoji-fallback" id="result-emoji-fallback"></span>
        <img class="result-photo" id="result-photo" alt="" style="display:none"/>
      </div>
      <p class="result-eyebrow" id="result-eyebrow">ТИ —</p>
      <h2 class="result-name" id="result-name"></h2>
      <div class="result-traits" id="result-traits"></div>
      <p class="result-desc" id="result-desc"></p>
    </main>
    <footer class="result-footer">
      <button class="btn-share" id="btn-share">✦ Поділитися</button>
      <button class="btn-retry" id="btn-retry">Пройти ще раз</button>
    </footer>
  </div>

  <div id="screen-collection" class="screen">
    <header class="top-bar">
      <button class="back-btn" id="collection-back-btn">←</button>
      <div class="logo" id="logo-collection"><span class="w1">ХТО</span><span class="w2">ТИ?</span></div>
      <div class="top-right">
        <button class="theme-toggle fs-btn" id="fs-btn-collection" title="Fullscreen">⛶</button>
        <button class="theme-toggle" id="theme-btn-collection">☀</button>
        <button class="theme-toggle" id="mode-btn-collection" title="Game Mode">🧩</button>
        <button class="lang-toggle" id="lang-btn-collection">UA</button>
      </div>
    </header>
    <main class="collection-main" id="collection-main"></main>
  </div>

  <script>

67,139,250,0.3);background:rgba(167,139,250,0.08);color:#a78bfa;font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:5px;}\n.install-btn:hover{border-color:#f0c060;color:#f0c060;background:rgba(240,192,96,0.08);}\n.logo{font-family:'Cinzel',serif;font-size:17px;font-weight:900;letter-spacing:1px;line-height:1;text-decoration:none;}\n.logo .w1{color:#a78bfa;}\n.logo .w2{color:#f0c060;}\n.top-right{display:flex;align-items:center;gap:7px;}\n.lang-toggle,.theme-toggle{font-size:11px;font-weight:800;padding:5px 11px;border-radius:99px;border:1.5px solid rgba(255,255,255,0.18);background:rgba(128,128,128,0.05);color:#8a7fb0;cursor:pointer;transition:all 0.2s;font-family:'Nunito',sans-serif;}\n.lang-toggle:hover,.theme-toggle:hover{border-color:#f0c060;color:#f0c060;}\n.back-btn{width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.18);background:rgba(128,128,128,0.05);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#8a7fb0;transition:all 0.2s;flex-shrink:0;}\n.back-btn:hover{border-color:#f0c060;color:#f0c060;}\n.home-main{flex:1;padding-bottom:24px;}\n.home-hero{padding:12px 0 26px;text-align:center;}\n.home-orb{width:68px;height:68px;border-radius:50%;background:radial-gradient(circle,rgba(167,139,250,0.25) 0%,transparent 70%);border:1.5px solid rgba(167,139,250,0.3);display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 16px;animation:pulse 3s ease-in-out infinite;}\n@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}\n.home-eyebrow{font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:#f0c060;margin-bottom:8px;opacity:0.8;}\n.home-title{font-family:'Cinzel',serif;font-size:30px;font-weight:900;line-height:1.2;background:linear-gradient(135deg,#a78bfa 0%,#f0c060 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;}\n.home-subtitle{font-size:13px;color:#8a7fb0;line-height:1.5;}\n.quiz-grid{display:flex;flex-direction:column;gap:10px;}\n.quiz-card{background:#160f2e;border:1.5px solid rgba(255,255,255,0.09);border-radius:22px;padding:15px 17px;cursor:pointer;transition:all 0.22s;display:flex;align-items:center;gap:13px;}\n.quiz-card:hover{border-color:#f0c060;transform:translateY(-2px);box-shadow:0 8px 24px rgba(109,40,217,0.35);}\n.quiz-card.coming-soon{opacity:0.35;cursor:default;}\n.quiz-card.coming-soon:hover{transform:none;border-color:rgba(255,255,255,0.09);box-shadow:none;}\n.quiz-card-emoji{font-size:36px;line-height:1;flex-shrink:0;}\n.quiz-card-body{flex:1;min-width:0;}\n.quiz-card-title{font-family:'Cinzel',serif;font-size:13px;font-weight:700;margin-bottom:3px;color:#ede8ff;}\n.quiz-card-desc{font-size:12px;color:#8a7fb0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}\n.quiz-card-arrow{font-size:15px;color:#8a7fb0;transition:all 0.2s;flex-shrink:0;}\n.quiz-card:hover .quiz-card-arrow{color:#f0c060;transform:translateX(3px);}\n.coming-soon-badge{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#8a7fb0;border:1.5px solid rgba(255,255,255,0.09);border-radius:99px;padding:3px 9px;flex-shrink:0;}\n.progress-wrap{flex:1;display:flex;flex-direction:column;gap:4px;}\n.progress-bar{height:3px;background:#1e1540;border-radius:99px;overflow:hidden;}\n.progress-fill{height:100%;background:linear-gradient(90deg,#a78bfa,#f0c060);border-radius:99px;transition:width 0.4s ease;width:0%;}\n.progress-label{font-size:10px;font-weight:700;color:#8a7fb0;text-align:center;letter-spacing:0.5px;}\n.quiz-main{flex:1;display:flex;flex-direction:column;justify-content:center;padding:8px 0 28px;}\n.question-card{animation:fadeUp 0.35s ease;}\n@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}\n.question-num{font-family:'Cinzel',serif;font-size:10px;font-weight:600;color:#f0c060;opacity:0.6;text-align:center;margin-bottom:10px;letter-spacing:2px;}\n.question-text{font-family:'Cinzel',serif;font-size:20px;font-weight:700;line-height:1.45;margin-bottom:20px;text-align:center;color:#ede8ff;}\n.options-grid{display:flex;flex-direction:column;gap:9px;}\n.option-btn{background:#160f2e;border:1.5px solid rgba(255,255,255,0.09);border-radius:14px;padding:14px 16px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:#ede8ff;cursor:pointer;text-align:left;transition:all 0.18s;line-height:1.4;width:100%;display:flex;align-items:center;gap:10px;}\n.option-key{font-family:'Cinzel',serif;font-size:11px;font-weight:700;color:#8a7fb0;background:#1e1540;border-radius:6px;padding:2px 7px;flex-shrink:0;min-width:22px;text-align:center;transition:all 0.18s;}\n.option-btn:hover{border-color:#f0c060;transform:translateX(5px);background:rgba(167,139,250,0.1);}\n.option-btn:hover .option-key{color:#a78bfa;}\n.option-btn.selected{border-color:#f0c060;background:rgba(240,192,96,0.08);transform:translateX(6px);pointer-events:none;color:#f0c060;}\n.option-btn.selected .option-key{background:#f0c060;color:#fff;border-color:#f0c060;}\n.result-main{flex:1;display:flex;flex-direction:column;align-items:center;padding:4px 0 16px;text-align:center;}\n.result-photo-wrap{width:190px;height:190px;border-radius:50%;overflow:hidden;border:2px solid #f0c060;box-shadow:0 0 0 8px rgba(167,139,250,0.1),0 0 40px rgba(109,40,217,0.35);margin:0 auto 16px;animation:popIn 0.65s cubic-bezier(0.34,1.56,0.64,1);position:relative;background:#1e1540;display:flex;align-items:center;justify-content:center;}\n@keyframes popIn{from{transform:scale(0.3);opacity:0;}to{transform:scale(1);opacity:1;}}\n.result-photo{width:100%;height:100%;object-fit:cover;transition:opacity 0.5s;}\n.result-emoji-fallback{font-size:80px;line-height:1;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}\n.result-eyebrow{font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:#f0c060;margin-bottom:6px;opacity:0.8;}\n.result-name{font-family:'Cinzel',serif;font-size:34px;font-weight:900;letter-spacing:-0.5px;margin-bottom:13px;background:linear-gradient(135deg,#f0c060,#ffd980);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}\n.result-traits{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:13px;}\n.trait-pill{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:5px 12px;border-radius:99px;background:rgba(167,139,250,0.1);color:#a78bfa;border:1.5px solid #f0c060;opacity:0.9;}\n.result-desc{font-size:14px;color:#8a7fb0;line-height:1.7;max-width:340px;}\n.result-footer{padding:12px 0 28px;display:flex;flex-direction:column;gap:9px;}\n.btn-share{width:100%;padding:16px;border-radius:14px;border:none;background:linear-gradient(135deg,#6d28d9,#a78bfa);color:#fff;font-family:'Cinzel',serif;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 18px rgba(109,40,217,0.35);}\n.btn-share:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(109,40,217,0.35);}\n.btn-retry{width:100%;padding:13px;border-radius:14px;border:1.5px solid rgba(255,255,255,0.18);background:transparent;color:#8a7fb0;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all 0.2s;}\n.btn-retry:hover{border-color:#8a7fb0;color:#ede8ff;}\n.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e1540;color:#ede8ff;border:1.5px solid rgba(255,255,255,0.18);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;padding:10px 20px;border-radius:99px;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;z-index:999;}\n.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}\n.quiz-card-right{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;}\n.quiz-card-collection{font-size:10 async function fetchPhoto(id, quizId) {
  try {
    if (DIRECT_PHOTOS[id]) return DIRECT_PHOTOS[id];
    if (quizId === 'peculiar') {
      const q = PECULIAR_PHOTOS[id] || id;
      const res = await fetch(`https://en.wikipedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(q)}&prop=pageimages&piprop=thumbnail&pithumbsize=400&format=json&origin=*&gsrlimit=1`);
      const data = await res.json();
      const pages = Object.values(data?.query?.pages || {});
      return pages[0]?.thumbnail?.source || null;
    }
    const wiki = WIKI[id];
    if (!wiki) return null;
    const wikiName = wiki.replace(/_/g, ' ').replace(/\(.*\)/, '').trim().toLowerCase();
    const wikiLangs = ['en', 'uk', 'de', 'es', 'fr', 'ru', 'ja'];
    for (const wl of wikiLangs) {
      try {
        const res = await fetch(`https://${wl}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wiki)}`);
        if (!res.ok) continue;
        const data = await res.json();
        const title = (data?.title || '').toLowerCase();
        if (!title.includes(wikiName.split(' ')[0])) continue;
        const src = data?.thumbnail?.source;
        if (src) return src.replace(/\/\d+px-/, '/400px-');
      } catch {}
    }
    return null;
  } catch (e) { return null; }
}

async function loadQuizData() {
  await Promise.all(QUIZ_IDS.map(async id => {
    try {
      const res = await fetch(`data/${id}.json`);
      if (!res.ok) throw new Error(res.status);
      QUIZ_DATA[id] = await res.json();
    } catch (e) {
      console.warn(`Failed to load data/${id}.json:`, e);
    }
  }));
}

function updateLogo() {
  const u = UI[lang];
  let html = `<span class="w1">${u.logo1}</span><span class="w2">${u.logo2}</span>`;
  if (u.logo3) html += `<span class="w1">${u.logo3}</span>`;

    const el = $(id);
    if (!el) return;
    el.innerHTML = html;
  });

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

function updateLangBtns() {
  const current = lang.toUpperCase();
  ['lang-btn','lang-btn-quiz','lang-btn-result','lang-btn-collection'].forEach(id => {
    const el = $(id); if (el) el.textContent = current;
  });
}

// --- History (attempts) ---
function getHistory(quizId) {
  try { return JSON.parse(localStorage.getItem('history_' + quizId) || '[]'); } catch { return []; }
}
function saveAttempt(quizId, resultId, questionsData) {
  const history = getHistory(quizId);
  history.push({
    date: new Date().toISOString(),
    result: resultId,
    questions: questionsData
  });
  localStorage.setItem('history_' + quizId, JSON.stringify(history));
}

// --- Collection (discovered characters) ---
function getDiscovered(quizId) {
  try { return JSON.parse(localStorage.getItem('discovered_' + quizId) || '[]'); } catch { return []; }
}
function addDiscovered(quizId, charId) {
  const set = new Set(getDiscovered(quizId));
  const isNew = !set.has(charId);
  set.add(charId);
  localStorage.setItem('discovered_' + quizId, JSON.stringify([...set]));
  return isNew;
}
function getDiscoveredCount(quizId) {
  return getDiscovered(quizId).length;
}
function getTotalCount(quizId) {
  return QUIZ_DATA[quizId]?.animals?.filter(a => !a.hidden)?.length || 0;
}

function openCollection(quizId) {
  const data = QUIZ_DATA[quizId];
  if (!data) return;
  const discovered = new Set(getDiscovered(quizId));
  const visible = data.animals.filter(a => !a.hidden);
  const main = $('collection-main');
  const quiz = QUIZZES.find(q => q.id === quizId);
  const title = quiz?.i18n[lang]?.title || quizId;
  let html = `<h2 class="collection-title">${t('collection_title')}: ${title}</h2>`;
  html += `<p class="collection-subtitle">${t('discovered').replace('{c}', discovered.size).replace('{t}', visible.length)}</p>`;
  html += '<div class="collection-grid">';
  visible.forEach(a => {
    const isOpen = discovered.has(a.id);
    const info = a.i18n[lang];
    if (isOpen) {
      html += `<div class="collection-card open" data-id="${a.id}" data-quiz="${quizId}">
        <div class="collection-photo"><span class="collection-emoji">${a.emoji}</span></div>
        <div class="collection-name">${info.name}</div>
        <div class="collection-traits">${info.traits.join(' · ')}</div>
      </div>`;
    } else {
      html += `<div class="collection-card locked">
        <div class="collection-photo"><span class="collection-emoji">❓</span></div>
      </div>`;
    }
  });
  html += '</div>';
  main.innerHTML = html;
  // Load photos for discovered characters
  visible.forEach(a => {
    if (!discovered.has(a.id)) return;
    fetchPhoto(a.id, quizId).then(url => {
      if (!url) return;
      const cards = main.querySelectorAll('.collection-card.open');
      const idx = visible.filter(x => !x.hidden && discovered.has(x.id)).indexOf(a);
      // Find card by name
      cards.forEach(card => {
        if (card.querySelector('.collection-name')?.textContent === a.i18n[lang].name) {
          const wrap = card.querySelector('.collection-photo');
          wrap.innerHTML = `<img src="${url}" alt="${a.i18n[lang].name}" loading="lazy" style="object-position:${PHOTO_POSITION[a.id]||'top'}">`;
        }
      });
    });
  });
  // Click on open card → show fullscreen detail
  main.querySelectorAll('.collection-card.open').forEach(card => {
    card.style.cursor = 'pointer';
    card.addEventListener('click', () => {
      const aid = card.dataset.id;
      const qid = card.dataset.quiz;
      showCharDetail(aid, qid);
    });
  });
  updateLogo();
  updateLangBtns();
  showScreen('collection');
}

function openHistory(quizId) {
  const data = QUIZ_DATA[quizId];
  if (!data) return;
  const history = getHistory(quizId);
  const quiz = QUIZZES.find(q => q.id === quizId);
  const title = quiz?.i18n[lang]?.title || quizId;
  const main = $('collection-main');
  let html = `<h2 class="collection-title">${t('history_title')}: ${title}</h2>`;
  html += '<div class="history-list">';
  const isTestMode = (quiz?.mode || 'personality') === 'test';
  history.slice().reverse().forEach((attempt, ri) => {
    const num = history.length - ri;
    if (isTestMode && attempt.result && typeof attempt.result === 'object') {
      const score = attempt.result;
      const emoji = score.percent >= 80 ? '🏆' : score.percent >= 50 ? '🎯' : '💪';
      html += `<div class="history-item" data-attempt="${history.length - 1 - ri}" data-quiz="${quizId}">
        <div class="history-emoji">${emoji}</div>
        <div class="history-body">
          <div class="history-name">${t('attempt')} ${num}: ${score.correct}/${score.total} · ${score.percent}%</div>
          <div class="history-date">${new Date(attempt.date).toLocaleDateString()}</div>
        </div>
        <div class="quiz-card-arrow">→</div>
      </div>`;
    } else {
      const animal = data.animals.find(a => a.id === attempt.result);
      if (!animal) return;
      const info = animal.i18n[lang];
      html += `<div class="history-item" data-attempt="${history.length - 1 - ri}" data-quiz="${quizId}">
        <div class="history-emoji">${animal.emoji}</div>
        <div class="history-body">
          <div class="history-name">${t('attempt')} ${num}: ${info.name}</div>
          <div class="history-date">${new Date(attempt.date).toLocaleDateString()}</div>
        </div>
        <div class="quiz-card-arrow">→</div>
      </div>`;
    }
  });
  html += '</div>';
  main.innerHTML = html;
  main.querySelectorAll('.history-item').forEach(item => {
    item.addEventListener('click', () => {
      const idx = parseInt(item.dataset.attempt);
      const qid = item.dataset.quiz;
      showAttemptDetail(qid, idx);
    });
  });
  updateLogo();
  updateLangBtns();
  showScreen('collection');
}

function showAttemptDetail(quizId, attemptIdx) {
  const data = QUIZ_DATA[quizId];
  const history = getHistory(quizId);
  const attempt = history[attemptIdx];
  if (!attempt || !data) return;
  const isTestResult = typeof attempt.result === 'object' && attempt.result !== null && attempt.result.mode === 'test';
  const animal = isTestResult ? null : data.animals.find(a => a.id === attempt.result);
  const info = animal?.i18n[lang];
  let existing = document.querySelector('.char-detail-overlay');
  if (existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.className = 'char-detail-overlay';
  let headerHtml;
  if (isTestResult) {
    const score = attempt.result;
    const emoji = score.percent >= 80 ? '🏆' : score.percent >= 50 ? '🎯' : '💪';
    headerHtml = `<div class="char-detail-photo-wrap"><span class="char-detail-emoji">${emoji}</span></div>
      <h2 class="char-detail-name">${score.correct}/${score.total} · ${score.percent}%</h2>`;
  } else {
    headerHtml = `<div class="char-detail-photo-wrap"><span class="char-detail-emoji">${animal?.emoji || '?'}</span></div>
      <h2 class="char-detail-name">${info?.name || attempt.result}</h2>`;
  }
  let html = `<div class="char-detail">
    <button class="char-detail-close">✕</button>
    ${headerHtml}
    <div class="attempt-questions">`;
  attempt.questions.forEach(aq => {
    const q = data.questions.find(x => x.id === aq.questionId);
    if (!q) return;
    html += `<div class="attempt-q">
      <div class="attempt-q-text">${q.i18n[lang].text}</div>
      <div class="attempt-options">`;
    q.options.forEach(o => {
      const isSelected = o.id === aq.selectedId;
      if (isTestResult) {
        const isCorrect = o.correct === true;
        let cls = '';
        if (isCorrect) cls = 'correct';
        if (isSelected && !isCorrect) cls = 'wrong';
        if (isSelected && isCorrect) cls = 'correct selected';
        html += `<div class="attempt-opt ${cls}">${o.i18n[lang].label}${isSelected ? ' ←' : ''}</div>`;
      } else {
        html += `<div class="attempt-opt ${isSelected ? 'selected' : ''}">${o.i18n[lang].label}</div>`;
      }
    });
    html += '</div></div>';
  });
  html += '</div></div>';
  overlay.innerHTML = html;
  document.body.appendChild(overlay);
  // Load photo (only for personality mode)
  if (!isTestResult && animal) fetchPhoto(animal.id, quizId).then(url => {
    if (!url) return;
    const wrap = overlay.querySelector('.char-detail-photo-wrap');
    wrap.innerHTML = `<img src="${url}" alt="${info?.name}" style="object-position:${PHOTO_POSITION[animal.id]||'top'}">`;
  });
  overlay.querySelector('.char-detail-close').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
}

function showCharDetail(charId, quizId) {
  const data = QUIZ_DATA[quizId];
  const animal = data.animals.find(a => a.id === charId);
  if (!animal) return;
  const info = animal.i18n[lang];

}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showToast(msg) {
  let el = document.querySelector('.toast');
  if (!el) { el = document.createElement('div'); el.className = 'toast'; document.body.appendChild(el); }
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}

let currentCategory = null; // null = top level, or category id

function renderHome() {
  updateLogo();
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
  const grid = $('quiz-grid');
  grid.innerHTML = '';
  // Breadcrumb back if inside category
  if (currentCategory) {
    const cat = QUIZZES.find(q => q.id === currentCategory);
    const back = document.createElement('div');
    back.className = 'category-back';
    back.innerHTML = `← ${cat?.i18n[lang]?.title || ''}`;
    back.addEventListener('click', () => { currentCategory = null; renderHome(); });
    grid.appendChild(back);
  }
  const list = QUIZZES.filter(q => {
    if ((q.mode || 'personality') !== gameMode) return false;
    if (currentCategory) {
      return q.category === currentCategory;
    }
    // Top level: show items without a category (categories themselves + non-category quizzes)
    return !q.category;
  });
  list.forEach(q => {
    const isCategory = q.type === 'category';
    const card = document.createElement('div');
    card.className = 'quiz-card' + (q.available ? '' : ' coming-soon') + (isCategory ? ' quiz-category' : '');
    const disc = isCategory ? 0 : getDiscoveredCount(q.id);
    const total = isCategory ? 0 : getTotalCount(q.id);
    const collBtn = !isCategory && disc > 0 ? `<div class="quiz-card-collection" data-quiz="${q.id}">${disc}/${total}</div>` : '';
    const histCount = isCategory ? 0 : getHistory(q.id).length;
    const histBtn = !isCategory && histCount > 0 ? `<div class="quiz-card-history" data-quiz="${q.id}">🕓${histCount}</div>` : '';
    // For category — count quizzes inside
    let catBadge = '';
    if (isCategory) {
      const inside = QUIZZES.filter(x => x.category === q.id && (x.mode || 'personality') === gameMode).length;
      catBadge = `<div class="quiz-card-catcount">${inside}</div>`;
    }
    card.innerHTML = `
      <div class="quiz-card-emoji">${q.emoji}</div>
      <div class="quiz-card-body">
        <div class="quiz-card-title">${q.i18n[lang].title}</div>
        <div class="quiz-card-desc">${q.i18n[lang].desc}</div>
      </div>
      <div class="quiz-card-right">
        ${catBadge}
        ${collBtn}
        ${histBtn}
        ${!q.available ? `<div class="coming-soon-badge">${t('coming_soon')}</div>` : (isCategory || (disc === 0 && histCount === 0)) ? '<div class="quiz-card-arrow">→</div>' : ''}
      </div>
    `;
    if (q.available) card.addEventListener('click', (e) => {
      if (e.target.closest('.quiz-card-collection') || e.target.closest('.quiz-card-history')) return;
      if (isCategory) { currentCategory = q.id; renderHome(); }
      else startQuiz(q);
    });
    const cb = card.querySelector('.quiz-card-collection');
    if (cb) cb.addEventListener('click', (e) => { e.stopPropagation(); openCollection(q.id); });
    const hb = card.querySelector('.quiz-card-history');
    if (hb) hb.addEventListener('click', (e) => { e.stopPropagation(); openHistory(q.id); });
    grid.appendChild(card);
  });
}

function startQuiz(quiz) {
  currentQuiz = quiz; answers = []; attemptLog = [];
  const data = QUIZ_DATA[quiz.id]; if (!data) return;
  currentQuiz.data = data;
  questions = shuffle(data.questions).slice(0, data.meta.questions_count || 8);
  currentQ = 0; showScreen('quiz'); renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ], total = questions.length;
  $('progress-fill').style.width = Math.round((currentQ / total) * 100) + '%';
  $('progress-label').textContent = t('progress').replace('{c}', currentQ + 1).replace('{t}', total);
  $('question-num').textContent = t('q_label') + ' ' + (currentQ + 1);
  $('question-text').textContent = q.i18n[lang].text;
  const grid = $('options-grid'); grid.innerHTML = '';
  shuffle(q.options).forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.dataset.optId = opt.id;
    btn.innerHTML = `<span class="option-key">${i + 1}</span><span>${opt.i18n[lang].label}</span>`;
    btn.addEventListener('click', () => selectAndAdvance(btn, opt));
    grid.appendChild(btn);
  });
  const card = $('question-card');
  card.style.animation = 'none';
  requestAnimationFrame(() => { card.style.animation = ''; });
}

document.addEventListener('keydown', e => {
  if (document.querySelector('.screen.active')?.id !== 'screen-quiz') return;
  const i = ['1','2','3','4'].indexOf(e.key);
  if (i < 0) return;
  const btns = document.querySelectorAll('.option-btn');
  if (btns[i] && !btns[i].classList.contains('selected')) btns[i].click();
});

let attemptLog = [];

// --- Mode-specific scorers ---
const SCORERS = {
  personality: {
    calcResult: (data) => {
      const scores = {};
      const hiddenIds = new Set(data.animals.filter(a => a.hidden).map(a => a.id));
      answers.forEach(opt => { opt.animals.forEach(a => { if (!hiddenIds.has(a)) scores[a] = (scores[a] || 0) + 1; }); });
      const winner = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
      return data.animals.find(a => a.id === winner);
    },
    onAnswer: null
  },
  test: {
    calcResult: () => {
      const correct = attemptLog.filter(l => l.correct).length;
      const total = attemptLog.length;
      return { mode: 'test', correct, total, percent: Math.round((correct / total) * 100) };
    },
    onAnswer: (btn, opt, q, showCorrect) => {
      if (!showCorrect) return;
      const isCorrect = opt.correct === true;
      btn.classList.add(isCorrect ? 'answer-correct' : 'answer-wrong');
      if (!isCorrect) {
        // Highlight the correct one too
        document.querySelectorAll('.option-btn').forEach(b => {
          if (b.dataset.optId && q.options.find(o => o.id === b.dataset.optId && o.correct)) {
            b.classList.add('answer-correct');
          }
        });
      }
    }
  }
};

function shouldShowCorrect(quiz) {
  if ((quiz.mode || 'personality') !== 'test') return false;
  const quizSetting = quiz.data?.meta?.showCorrectDuringQuiz;
  const userSetting = localStorage.getItem('showCorrectDuringQuiz');
  // Default: show correct (true). User can disable.
  if (userSetting === 'false') return false;
  if (quizSetting === false) return false;
  return true;
}

function selectAndAdvance(btn, opt) {
  document.querySelectorAll('.option-btn').forEach(b => { b.style.pointerEvents = 'none'; });
  btn.classList.add('selected'); answers.push(opt);
  const q = questions[currentQ];
  const isCorrect = opt.correct === true;
  attemptLog.push({ questionId: q.id, selectedId: opt.id, correct: isCorrect });
  const mode = currentQuiz.mode || 'personality';
  const scorer = SCORERS[mode];
  let delay = 650;
  if (scorer.onAnswer && shouldShowCorrect(currentQuiz)) {
    scorer.onAnswer(btn, opt, q, true);
    delay = 1200;
  }
  setTimeout(() => {
    currentQ++;
    if (currentQ >= questions.length) showResult(); else renderQuestion();
  }, delay);
}

function calcResult() {
  const mode = currentQuiz.mode || 'personality';
  return SCORERS[mode].calcResult(currentQuiz.data);
}

async function showResult() {
  currentAnimal = calcResult();
  const mode = currentQuiz.mode || 'personality';
  if (mode === 'personality') {
    const isNew = addDiscovered(currentQuiz.id, currentAnimal.id);
    saveAttempt(currentQuiz.id, currentAnimal.id, attemptLog);
    renderResultUI(isNew);
    const img = $('result-photo');
    img.style.opacity = '0'; img.style.display = 'block';
    img.style.objectPosition = PHOTO_POSITION[currentAnimal.id] || 'top';
    fetchPhoto(currentAnimal.id, currentQuiz.id).then(url => {
      if (url) {
        img.src = url;
        img.onload = () => { $('result-emoji-fallback').style.opacity = '0'; img.style.opacity = '1'; };
        img.onerror = () => { img.style.display = 'none'; };
      }
    });
    showScreen('result');
    if (navigator.share && 'ontouchstart' in window) {
      setTimeout(doShare, 600);
    }
  } else {
    // Test mode
    saveAttempt(currentQuiz.id, currentAnimal, attemptLog);
    renderTestResultUI(currentAnimal);
    showScreen('result');
  }
}

function renderResultUI(isNew) {
  const info = currentAnimal.i18n[lang];
  $('result-eyebrow').textContent = t('result_eyebrow');
  $('result-name').textContent = info.name;
  $('result-desc').textContent = info.description;
  $('result-emoji-fallback').textContent = currentAnimal.emoji;
  $('result-emoji-fallback').style.opacity = '1';
  const tr = $('result-traits'); tr.innerHTML = '';
  info.traits.forEach(tx => {
    const p = document.createElement('span'); p.className = 'trait-pill'; p.textContent = tx; tr.appendChild(p);
  });
  // Discovery badge
  const disc = getDiscoveredCount(currentQuiz.id);
  const total = getTotalCount(currentQuiz.id);
  const discLabel = t('discovered').replace('{c}', disc).replace('{t}', total);
  const newLabel = isNew !== undefined ? (isNew ? t('new_char') : t('old_char')) : '';
  let badge = $('result-discovered');
  if (!badge) {
    badge = document.createElement('div'); badge.id = 'result-discovered'; badge.className = 'result-discovered';
    $('result-desc').after(badge);
  }
  badge.innerHTML = (newLabel ? `<span class="discovery-badge ${isNew ? 'is-new' : ''}">${newLabel}</span> ` : '') + `<span class="discovery-count">${discLabel}</span>`;
  // Hide test-mode mentor/fact cards
  const mc = $('result-mentor-card'); if (mc) mc.style.display = 'none';
  const fc = $('result-fact-card'); if (fc) fc.style.display = 'none';
  const btnShare = $('btn-share');
  btnShare.textContent = t('btn_share');
  btnShare.onclick = doShare;
  $('btn-retry').textContent = t('btn_retry');
  const nameEl = $('result-name');
  nameEl.className = 'result-name';
  updateLogo();
}

function pickMentor(quiz, percent) {
  const mentors = quiz.data?.meta?.mentors || [];
  const matching = mentors.find(m =>
    (m.rangeMin === undefined || percent >= m.rangeMin) &&
    (m.rangeMax === undefined || percent <= m.rangeMax)
  );
  if (!matching) return null;
  const list = matching.i18n?.[lang] || matching.i18n?.en || [];
  return list.length ? list[Math.floor(Math.random() * list.length)] : null;
}

function pickFact(quiz) {
  const facts = quiz.data?.meta?.facts?.[lang] || quiz.data?.meta?.facts?.en || [];
  return facts.length ? facts[Math.floor(Math.random() * facts.length)] : null;
}

function renderTestResultUI(score) {
  // Hide personality-specific elements
  $('result-eyebrow').textContent = t('test_result_eyebrow');
  $('result-name').textContent = `${score.correct}/${score.total}`;
  $('result-desc').textContent = `${score.percent}%`;
  // Color by score
  const nameEl = $('result-name');
  nameEl.className = 'result-name ' + (score.percent >= 80 ? 'score-high' : score.percent >= 50 ? 'score-mid' : 'score-low');
  // Icon based on score
  const emoji = score.percent >= 80 ? '🏆' : score.percent >= 50 ? '🎯' : '💪';
  $('result-emoji-fallback').textContent = emoji;
  $('result-emoji-fallback').style.opacity = '1';
  $('result-photo').style.display = 'none';
  const tr = $('result-traits'); tr.innerHTML = '';
  // Clear discovery badge
  const disc = $('result-discovered'); if (disc) disc.remove();
  // Mentor + Fact
  const mentor = pickMentor(currentQuiz, score.percent);
  const fact = pickFact(currentQuiz);
  let mentorCard = $('result-mentor-card');
  let factCard = $('result-fact-card');
  if (!mentorCard) {
    mentorCard = document.createElement('div');
    mentorCard.id = 'result-mentor-card';
    mentorCard.className = 'result-mentor-card';
    $('result-desc').after(mentorCard);
  }
  if (!factCard) {
    factCard = document.createElement('div');
    factCard.id = 'result-fact-card';
    factCard.className = 'result-fact-card';
    mentorCard.after(factCard);
  }
  if (mentor) {
    mentorCard.innerHTML = `
      <div class="mentor-avatar">
        <span class="mentor-emoji">${mentor.emoji}</span>
        <span class="mentor-name">${mentor.name}</span>
      </div>
      <p class="mentor-quote">«&nbsp;${mentor.message}&nbsp;»</p>`;
    mentorCard.style.display = '';
  } else {
    mentorCard.style.display = 'none';
  }
  if (fact) {
    factCard.innerHTML = `
      <div class="fact-label">💡 ${t('fact_label')}</div>
      <p class="fact-text">${fact}</p>`;
    factCard.style.display = '';
  } else {
    factCard.style.display = 'none';
  }
  // Replace share button with review button
  const btnShare = $('btn-share');
  btnShare.textContent = t('review_answers');
  btnShare.onclick = () => showTestReview(currentQuiz.id, attemptLog);
  $('btn-retry').textContent = t('btn_retry');
  updateLogo();
}

function showTestReview(quizId, log) {
  const data = QUIZ_DATA[quizId];
  if (!data) return;
  let existing = document.querySelector('.char-detail-overlay');
  if (existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.className = 'char-detail-overlay';
  let html = `<div class="char-detail">
    <button class="char-detail-close">✕</button>
    <h2 class="char-detail-name">${t('review_answers')}</h2>
    <div class="attempt-questions">`;
  log.forEach(aq => {
    const q = data.questions.find(x => x.id === aq.questionId);
    if (!q) return;
    html += `<div class="attempt-q">
      <div class="attempt-q-text">${q.i18n[lang].text}</div>
      <div class="attempt-options">`;
    q.options.forEach(o => {
      const isSelected = o.id === aq.selectedId;
      const isCorrect = o.correct === true;
      let cls = '';
      if (isCorrect) cls = 'correct';
      if (isSelected && !isCorrect) cls = 'wrong';
      if (isSelected && isCorrect) cls = 'correct selected';
      html += `<div class="attempt-opt ${cls}">${o.i18n[lang].label}${isSelected ? ' ←' : ''}</div>`;
    });
    html += '</div></div>';
  });
  html += '</div></div>';
  overlay.innerHTML = html;
  document.body.appendChild(overlay);
  overlay.querySelector('.char-detail-close').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
}

async function doShare() {
  const name = $('result-name').textContent;
  const shareTexts = { ua: `Я — ${name}! Дізнайся хто ти`, en: `I am ${name}! Find out who you are`, es: `¡Soy ${name}! Descubre quién eres`, de: `Ich bin ${name}! Finde heraus wer du bist` };
  const text = shareTexts[lang] || shareTexts.en;
  if (navigator.share) {
    try { await navigator.share({ title: text, text, url: location.href }); } catch (_) {}
  } else {
    try { await navigator.clipboard.writeText(location.href); } catch (_) {}
    showToast(t('copied'));
  }
}
$('btn-share').onclick = doShare;

$('btn-retry').addEventListener('click', () => startQuiz(currentQuiz));
$('quiz-back-btn').addEventListener('click', () => { showScreen('home'); renderHome(); });
$('result-back-btn').addEventListener('click', () => { showScreen('home'); renderHome(); });
$('collection-back-btn').addEventListener('click', () => { showScreen('home'); renderHome(); });

const LANGS = ['ua', 'en', 'es', 'de'];
function toggleLang() {
  lang = LANGS[(LANGS.indexOf(lang) + 1) % LANGS.length];
  updateLangBtns();
  const a = document.querySelector('.screen.active').id;
  if (a === 'screen-home') renderHome();
  else if (a === 'screen-quiz') renderQuestion();
  else if (a === 'screen-result') renderResultUI();
}

['lang-btn','lang-btn-quiz','lang-btn-result','lang-btn-collection'].forEach(id => {
  const el = $(id); if (el) el.addEventListener('click', toggleLang);
});
['theme-btn','theme-btn-quiz','theme-btn-result','theme-btn-collection'].forEach(id => {
  const el = $(id); if (el) el.addEventListener('click', toggleTheme);
});
['mode-btn','mode-btn-quiz','mode-btn-result','mode-btn-collection'].forEach(id => {
  const el = $(id); if (el) el.addEventListener('click', toggleGameMode);
});

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen().catch(() => {});
  }
}
function updateFsButtons() {
  const icon = document.fullscreenElement ? '⛶' : '⛶';
  ['fs-btn','fs-btn-quiz','fs-btn-result','fs-btn-collection'].forEach(id => {
    const el = $(id); if (el) el.style.opacity = document.fullscreenElement ? '0.5' : '1';
  });
}
['fs-btn','fs-btn-quiz','fs-btn-result','fs-btn-collection'].forEach(id => {
  const el = $(id); if (el) el.addEventListener('click', toggleFullscreen);
});
document.addEventListener('fullscreenchange', updateFsButtons);

// --- Service Worker ---
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// --- PWA Install ---
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const btn = $('install-btn');
  if (btn) btn.style.display = '';
});
window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  const btn = $('install-btn');
  if (btn) btn.style.display = 'none';
});
const installBtn = $('install-btn');
if (installBtn) installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') {
    const btn = $('install-btn');
    if (btn) btn.style.display = 'none';
  }
  deferredPrompt = null;
});
// Hide install button if already in standalone mode
if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
  const btn = $('install-btn');
  if (btn) btn.style.display = 'none';
}

applyTheme('dark');
updateModeBtns();
loadQuizData().then(() => renderHome());
</script>
</body>
</html>
