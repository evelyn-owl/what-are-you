<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0818"/>
      <stop offset="100%" style="stop-color:#1a1040"/>
    </linearGradient>
    <linearGradient id="text1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
    <linearGradient id="text2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c060"/>
      <stop offset="100%" style="stop-color:#ffd980"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="20%">
      <stop offset="0%" style="stop-color:rgba(167,139,250,0.3)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="80%">
      <stop offset="0%" style="stop-color:rgba(240,192,96,0.2)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Glows -->
  <rect width="512" height="512" rx="108" fill="url(#glow1)"/>
  <rect width="512" height="512" rx="108" fill="url(#glow2)"/>
  <!-- Stars -->
  <circle cx="80" cy="90" r="1.5" fill="rgba(255,255,255,0.7)"/>
  <circle cx="430" cy="70" r="2" fill="rgba(255,255,255,0.8)"/>
  <circle cx="60" cy="400" r="1.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="450" cy="420" r="1.8" fill="rgba(255,255,255,0.6)"/>
  <circle cx="250" cy="50" r="1.2" fill="rgba(240,192,96,0.6)"/>
  <!-- Sparkle top -->
  <text x="256" y="155" text-anchor="middle" font-family="serif" font-size="56" fill="rgba(240,192,96,0.4)">&#10024;</text>
  <!-- ХТО -->
  <text x="256" y="270" text-anchor="middle" font-family="'Cinzel', 'Georgia', serif" font-size="120" font-weight="900" letter-spacing="6" fill="url(#text1)">ХТО</text>
  <!-- ТИ? -->
  <text x="256" y="390" text-anchor="middle" font-family="'Cinzel', 'Georgia', serif" font-size="120" font-weight="900" letter-spacing="6" fill="url(#text2)">ТИ?</text>
  <!-- Subtle border -->
  <rect x="4" y="4" width="504" height="504" rx="106" fill="none" stroke="rgba(167,139,250,0.15)" stroke-width="2"/>
</svg>
